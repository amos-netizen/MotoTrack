services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mototrack-backend
    environment:
      DATABASE_URL: sqlite:////data/mototrack.db
      CORS_ORIGINS: http://localhost
    volumes:
      - mototrack_data:/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mototrack-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mototrack_data:
